<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbhiMate · Sign in</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <script>
        (function () {
            try {
                var stored = localStorage.getItem('abhimate.theme');
                var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
                document.documentElement.setAttribute('data-theme', stored || (prefersLight ? 'light' : 'dark'));
            } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
        })();
    </script>
</head>
<body class="auth-body">
    <div class="auth-aurora" aria-hidden="true">
        <span class="aurora-blob aurora-1"></span>
        <span class="aurora-blob aurora-2"></span>
        <span class="aurora-blob aurora-3"></span>
    </div>

    <main class="auth-shell">
        <section class="auth-card glass-panel" data-tilt>
            <header class="auth-header">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" aria-hidden="true" class="auth-logo">
                    <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                    <polyline points="2 17 12 22 22 17"></polyline>
                    <polyline points="2 12 12 17 22 12"></polyline>
                </svg>
                <h1 class="auth-title">AbhiMate</h1>
                <p class="auth-subtitle" id="authSubtitle">Sign in to your testing workspace.</p>
            </header>

            <div class="auth-tabs" role="tablist" aria-label="Authentication mode">
                <button role="tab" class="auth-tab active" id="authTabLogin"
                        aria-selected="true" aria-controls="loginForm" type="button">Sign in</button>
                <button role="tab" class="auth-tab" id="authTabSignup"
                        aria-selected="false" aria-controls="signupForm" type="button">Create account</button>
                <span class="auth-tab-indicator" aria-hidden="true"></span>
            </div>

            <form id="loginForm" class="auth-form active" role="tabpanel" aria-labelledby="authTabLogin" novalidate>
                <div class="auth-field">
                    <label for="loginEmail">Email</label>
                    <input id="loginEmail" name="email" type="email" autocomplete="email"
                           required placeholder="you@company.com">
                </div>
                <div class="auth-field">
                    <label for="loginPassword">Password</label>
                    <input id="loginPassword" name="password" type="password" autocomplete="current-password"
                           required minlength="8" placeholder="••••••••">
                </div>
                <button type="submit" class="auth-submit">
                    <span class="auth-submit-text">Sign in</span>
                    <span class="spinner auth-spinner hidden"></span>
                </button>
                <p class="auth-error" id="loginError" role="alert"></p>
            </form>

            <form id="signupForm" class="auth-form" role="tabpanel" aria-labelledby="authTabSignup" novalidate hidden>
                <div class="auth-field">
                    <label for="signupName">Name <span class="auth-optional">(optional)</span></label>
                    <input id="signupName" name="display_name" type="text" autocomplete="name"
                           placeholder="Abhinav">
                </div>
                <div class="auth-field">
                    <label for="signupEmail">Email</label>
                    <input id="signupEmail" name="email" type="email" autocomplete="email"
                           required placeholder="you@company.com">
                </div>
                <div class="auth-field">
                    <label for="signupPassword">Password</label>
                    <input id="signupPassword" name="password" type="password" autocomplete="new-password"
                           required minlength="8" placeholder="At least 8 characters">
                    <p class="auth-hint">8+ characters. Use a passphrase if you can.</p>
                </div>
                <button type="submit" class="auth-submit">
                    <span class="auth-submit-text">Create account</span>
                    <span class="spinner auth-spinner hidden"></span>
                </button>
                <p class="auth-error" id="signupError" role="alert"></p>
            </form>

            <footer class="auth-footer">
                <p>5 sessions per account. Generate, run, and triage tests with AI.</p>
            </footer>
        </section>
    </main>

    <script>
      window.__INITIAL_AUTH_MODE = {{ initial_mode | tojson }};
    </script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
